<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://kit.fontawesome.com/4a2b055604.js" crossorigin="anonymous"></script>
    <link rel="stylesheet" href="styles.css">
    <title>Document</title>
</head>

<body>
    <header>
        <nav>
            <img src="/public/logo.png" alt="smile school logo">
            <ul>
            <li><a href="#">COURSE</a></li>
            <li><a href="#">PRICING</a></li>
            <li><a href="#">LOGIN</a></li>
            </ul>
        </nav>

    </header>
    <main>
        <section>
            <div>
                <h1>Get schooled</h1>
                <div>
                    <span>SMILES</span>
                    <span>GRIN</span>
                    <span>LAUGH</span>
                </div>
                <button type="submit">REGISTER FOR FREE</button>
            </div>
            <div>
                <h2><span>Learn</span> from the pros</h2>
                <div>
                    <div>
                        <img src="/public/1.png" alt="">
                        <h3>Phillip Massey</h3>
                        <p>« Smile of the year » 2018 - 2019</p>
                    </div>
                    <div>
                        <img src="/public/3.png" alt="">
                        <h3>Nannie Lawrence</h3>
                        <p>Best « little smile » 2017</p>
                    </div>
                    <div>
                        <img src="/public/2.png" alt="">
                        <h3>Bruce Walters</h3>
                        <p>Best « Friend Smile » live performance 2019</p>
                    </div>
                    <div>
                        <img src="/public/4.png" alt="">
                        <h3>Henry Hughes</h3>
                        <p>« 24h smiles » winner 2016 - 2019</p>
                    </div>
                </div>
            </div>
        </section>

    </main>

</body>

</html>
